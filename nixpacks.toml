# Nixpacks — build do backend NestJS no Railway.
#
# build: gera o Prisma Client e compila o Nest.
# start: aplica migrations pendentes e sobe a API.
#        (migrate deploy é idempotente e seguro em cada boot/redeploy)

[phases.build]
cmds = ["npm ci", "npm run build"]

[start]
cmd = "npm run release"
